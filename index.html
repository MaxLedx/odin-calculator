<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <script src="./script.js" defer></script>
    <title>Calculator</title>
</head>

<body>
    <div id="calculator">
        <div id="display">RESULT</div>
        <div id="clear" class="btn btn-medium btn-action">
            <div>CLEAR</div>
        </div>
        <div id="back" class="btn btn-medium btn-action">
            <div>BACK</div>
        </div>
        <div id="divide" class="btn btn-operator">/</div>
        <div id="seven" class="btn btn-digit">7</div>
        <div id="eight" class="btn btn-digit">8</div>
        <div id="nine" class="btn btn-digit">9</div>
        <div id="multiply" class="btn btn-operator">*</div>
        <div id="four" class="btn btn-digit">4</div>
        <div id="five" class="btn btn-digit">5</div>
        <div id="six" class="btn btn-digit">6</div>
        <div id="subtract" class="btn btn-operator">-</div>
        <div id="one" class="btn btn-digit">1</div>
        <div id="two" class="btn btn-digit">2</div>
        <div id="three" class="btn btn-digit">3</div>
        <div id="add" class="btn btn-operator">+</div>
        <div id="zero" class="btn btn-large btn-digit">0</div>
        <div id="period" class="btn btn-digit">.</div>
        <div id="equals" class="btn btn-operator">=</div>
    </div>
</body>

</html>
